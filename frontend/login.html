<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="wrapper">

  <!-- LEFT SIDE (IMAGE / BRAND) -->
  <div class="left-panel">
    <div class="overlay">
      <h1>Inventory Security Engine designed for Indian businesses</h1>
      <p>Manage orders. Track inventory. Handle GST billing. Oversee warehouses. One inventory management software to run all your inventory operations.</p>
    </div>
  </div>

  <!-- RIGHT SIDE (FORM) -->
  <div class="right-panel">
    <div class="form-box">
      <h2>Login</h2>
      <p>Access your account</p>

    <form id="loginForm">
        <input type="text" id="loginIdentifier" placeholder="Username or Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>

        <button type="submit">Login</button>
      </form>
      
      <p class="switch">
        Don’t have an account? <a href="signup.html">Create Account</a>
      </p>
    </div>
  </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>
