<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Inventory Security Engine</title>
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="wrapper">

  <div class="left-panel">
    <div class="overlay">
      <h1>Inventory Security Engine</h1>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-box">
      <h2 id="formTitle">Login</h2>
      <p id="formSubtitle">Access your account</p>

      <form id="loginForm">
        <input type="text"     id="loginIdentifier" placeholder="Username or Email" required>
        <input type="password" id="loginPassword"   placeholder="Password"          required>

        <div class="captcha-box">
          <label class="captcha-label">Captcha</label>
          <div class="captcha-row">
            <canvas id="captchaCanvas" width="160" height="48"></canvas>
            <button type="button" id="refreshCaptcha" title="Refresh CAPTCHA">&#x21bb;</button>
          </div>
          <input type="text" id="captchaInput" placeholder="Enter characters above"
                 autocomplete="off" maxlength="6" required>
          <span id="captchaError" class="captcha-error"></span>
        </div>

        <button type="submit">Login</button>
      </form>

      <form id="twoFactorForm" style="display: none;">
        <p style="margin-bottom: 15px; color: #64748b; font-size: 0.9rem;">A 6-digit verification code has been sent to your email.</p>
        <input type="text" id="twoFactorCode" placeholder="123456" maxlength="6" required style="letter-spacing: 5px; text-align: center; font-size: 1.2rem; font-weight: bold;">
        <p id="twoFactorError" style="color: #dc2626; font-size: 0.85rem; margin-bottom: 10px;"></p>
        
        <button type="submit">Verify & Login</button>
        <button type="button" id="backToLoginBtn" style="margin-top: 10px; background: transparent; border: 1px solid #cbd5e1; color: #475569; width: 100%; padding: 12px; border-radius: 5px; cursor: pointer; transition: 0.3s; font-weight: bold;">Back to Login</button>
      </form>

      <div class="forgot-password-section" id="forgotPasswordDiv">
        <a href="forgot-password.html">Forgot password?</a>
      </div>

      <p class="switch" id="createAccountDiv">
        Don't have an account? <a href="signup.html">Create Account</a>
      </p>
    </div>
  </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>
