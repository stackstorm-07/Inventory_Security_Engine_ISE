<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Inventory Security Engine</title>
    <link rel="stylesheet" href="css/auth.css">
    <style>
        .svg-container { text-align: center; margin-bottom: 15px; }
        /* Basic styling for the captcha block so it looks neat */
        .captcha-box { margin: 15px 0; text-align: left; }
        .captcha-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .captcha-error { font-size: 12px; color: #ef4444; display: block; margin-top: 5px; }
        #refreshCaptcha { cursor: pointer; padding: 5px 10px; font-size: 18px; border-radius: 4px; border: 1px solid #ddd; background: #fff; }
    </style>
</head>
<body>

<div class="wrapper">
  <div class="left-panel">
    <div class="overlay">
      <h1>Inventory Security Engine</h1>
      <p>Secure password recovery for your account.</p>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-box">
      
      <div class="svg-container">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9d2b8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
      </div>

      <h2>Reset Your Password</h2>
      <p id="formSubtitle">Enter your username or email to receive a reset code</p>

      <div id="requestTokenSection">
        <form id="requestTokenForm">
          <input type="text" id="identifier" placeholder="Username or Email" required>
          
          <div class="captcha-box">
            <label class="captcha-label" style="font-size: 14px; color: #cbd5e1;">Security Check</label>
            <div class="captcha-row">
              <canvas id="captchaCanvas" width="160" height="48" style="background: #f8fafc; border-radius: 4px; border: 1px solid #cbd5e1;"></canvas>
              <button type="button" id="refreshCaptcha" title="Refresh CAPTCHA">&#x21bb;</button>
            </div>
            <input type="text" id="captchaInput" placeholder="Enter characters above" autocomplete="off" autocapitalize="none" spellcheck="false" style="text-transform: none;" maxlength="6" required>
            <span id="captchaError" class="captcha-error"></span>
          </div>

          <button type="submit">Send Reset Code</button>
        </form>
      </div>

      <div id="resetPasswordSection" style="display: none;">
        <form id="resetPasswordForm">
          <input type="text" id="resetIdentifier" placeholder="Username or Email" readonly style="background-color: #f3f4f6; color: #6b7280; cursor: not-allowed; margin-bottom: 10px;">
          <input type="text" id="resetToken" placeholder="Reset Code (e.g. a1b2c3)" required>
          <input type="password" id="newPassword" placeholder="New Password" required>
          <div id="passwordStrength" class="strength-meter"></div>
          <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
          <button type="submit">Reset Password</button>
        </form>
      </div>

      <p class="switch">
        Remember your password? <a href="login.html">Back to Login</a>
      </p>
    </div>
  </div>
</div>

<script src="js/forgot-password.js"></script>
</body>
</html>
