<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="wrapper">

  <div class="left-panel">
    <div class="overlay">
      <h1>Inventory Security Engine software designed for Indian businesses</h1>
      <p>Manage orders. Track inventory. Handle GST billing. Oversee warehouses. One inventory management software to run all your inventory operations.</p>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-box">
      <h2>Let's get started</h2>
      <p>Sign up to continue</p>

      <form id="signupForm">
        <input type="text" id="signupFullName" placeholder="Full Name" required>
        <input type="text" id="signupUsername" placeholder="Username" required>
        <input type="email" id="signupEmail" placeholder="Email Address" required>
        <input type="text" id="signupPhone" placeholder="Phone Number" required>
        
        <input type="password" id="signupPassword" placeholder="Password" required>
        <div id="passwordStrength" class="strength-meter"></div>
        <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required>

        <div class="checkbox-container">
          <input type="checkbox" id="termsCheckbox" required>
          <label for="termsCheckbox">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        </div>

        <button type="submit">Create Account</button>
      </form>

      <p class="switch">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>
